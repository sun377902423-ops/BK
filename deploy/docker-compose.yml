version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bksys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bksys
      POSTGRES_PASSWORD: bksys123
      POSTGRES_DB: bksys_med
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bksys -d bksys_med"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bksys-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  orthanc:
    image: jodogne/orthanc-plugins:1.12.4
    container_name: bksys-orthanc
    restart: unless-stopped
    environment:
      ORTHANC__NAME: "BKSYS PACS"
      ORTHANC__STG__PostgreSQL__EnableIndex: "true"
      ORTHANC__PostgreSQL__Host: "postgres"
      ORTHANC__PostgreSQL__Port: 5432
      ORTHANC__PostgreSQL__Database: "bksys_med"
      ORTHANC__PostgreSQL__Username: "bksys"
      ORTHANC__PostgreSQL__Password: "bksys123"
      ORTHANC__RegisteredUsers: "orthanc:orthanc"
      ORTHANC__DICOMWeb__Enable: "true"
      ORTHANC__WADO__Enable: "true"
      VERBOSE_ENABLED: "false"
    ports:
      - "8042:8042"
      - "4242:4242"
    volumes:
      - orthanc_data:/var/lib/orthanc/db
    depends_on:
      - postgres

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bksys-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "postgresql://bksys:bksys123@postgres:5432/bksys_med?schema=public"
      JWT_SECRET: "bksys-med-jwt-secret-change-in-production"
      REDIS_URL: "redis://redis:6379"
      ORTHANC_URL: "http://orthanc:8042"
      ORTHANC_USER: "orthanc"
      ORTHANC_PASS: "orthanc"
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - orthanc

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bksys-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  ohif-viewer:
    image: ohif/viewer:v3.8.1
    container_name: bksys-ohif
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./ohif-app-config.js:/usr/share/nginx/html/app-config.js:ro
    environment:
      - APP_CONFIG=

  nginx:
    image: nginx:1.27-alpine
    container_name: bksys-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
      - orthanc
      - ohif-viewer

volumes:
  postgres_data:
  redis_data:
  orthanc_data:
