version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bksys-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bksys
      POSTGRES_PASSWORD: bksys123
      POSTGRES_DB: bksys_med
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bksys -d bksys_med"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bksys-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  orthanc:
    image: jodogne/orthanc-plugins:1.12.4
    container_name: bksys-orthanc
    restart: unless-stopped
    command: /etc/orthanc/orthanc-config.json
    volumes:
      - orthanc_data:/var/lib/orthanc/db
      - ./orthanc-config.json:/etc/orthanc/orthanc-config.json:ro
    ports:
      - "8042:8042"
      - "4242:4242"
    depends_on:
      - postgres

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bksys-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "postgresql://bksys:bksys123@postgres:5432/bksys_med?schema=public"
      JWT_SECRET: "bksys-med-jwt-secret-change-in-production"
      REDIS_URL: "redis://redis:6379"
      ORTHANC_URL: "http://orthanc:8042"
      ORTHANC_USER: "orthanc"
      ORTHANC_PASS: "orthanc"
      LIVEKIT_API_KEY: "bksyslivekit"
      LIVEKIT_API_SECRET: "bksyslivekitsecret1234567890abcdef"
      LIVEKIT_URL: "ws://livekit:7880"
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - uploads_data:/app/uploads
    depends_on:
      - postgres
      - redis
      - orthanc

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: bksys-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  ohif-viewer:
    image: ohif/viewer:latest
    container_name: bksys-ohif
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./ohif-app-config.js:/usr/share/nginx/html/app-config.js:ro
    environment:
      - APP_CONFIG=

  livekit:
    image: livekit/livekit-server:latest
    container_name: bksys-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    command: --config /etc/livekit.yaml --node-ip 115.29.203.40

  nginx:
    image: nginx:1.27-alpine
    container_name: bksys-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./ohif-custom.js:/etc/nginx/custom/ohif-custom.js:ro
    depends_on:
      - backend
      - frontend
      - orthanc
      - ohif-viewer
      - livekit

volumes:
  postgres_data:
  redis_data:
  orthanc_data:
  uploads_data:
