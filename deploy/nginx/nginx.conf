events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_proxied any;

    map $http_origin $cors_origin_allow {
        default "";
        "~^https?://(localhost|127\.0\.0\.1)(:\d+)?$" "$http_origin";
    }

    # HTTP → HTTPS 强制跳转（保留 /health 用于探活）
    server {
        listen 80;
        server_name _;

        location = /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host:8443$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name _;
        client_max_body_size 100M;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ---- 安全响应头 -----------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=(self), payment=()" always;
        # CSP（OHIF/LiveKit 需要 unsafe-inline + ws:）
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss: blob:; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'self'; object-src 'none'" always;

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location /api/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /uploads/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "public, max-age=86400";
        }

        location /orthanc/ {
            proxy_pass http://orthanc:8042/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # 在 nginx 容器启动时由 deploy.sh / setup 注入真实的 Basic Auth
            # 默认值仅在测试环境使用，生产必须由 deploy.sh 覆写
            proxy_set_header Authorization "Basic b3J0aGFuYzpvcnRoYW5j";
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_hide_header WWW-Authenticate;

            if ($http_origin ~* "^https?://(localhost|127\.0\.0\.1)(:\d+)?$") {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
            }

            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "$http_origin" always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, X-Requested-With" always;
                add_header Access-Control-Max-Age 3600;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }
        }

        location = /ohif-custom.js {
            root /etc/nginx/custom;
            add_header Content-Type application/javascript;
            add_header Cache-Control "no-cache, no-store";
        }

        location /ohif/ {
            proxy_pass http://ohif-viewer:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Accept-Encoding "";
            sub_filter_types text/html;
            sub_filter 'src="/' 'src="/ohif/';
            sub_filter 'href="/' 'href="/ohif/';
            sub_filter "window.PUBLIC_URL = '/'" "window.PUBLIC_URL = '/ohif/'";
            sub_filter "window.PUBLIC_URL='/'" "window.PUBLIC_URL='/ohif/'";
            sub_filter "window.PUBLIC_URL = \"/\"" "window.PUBLIC_URL = \"/ohif/\"";
            sub_filter '<title>OHIF Viewer</title>' '<title>BK-PACS</title>';
            sub_filter '</head>' '<script src="/ohif-custom.js"></script></head>';
            sub_filter_once off;
        }

        location ~ ^/[^/]+\.(js|css|json|mjs|map|png|ico|svg|woff2?)$ {
            proxy_pass http://ohif-viewer:80;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /app-config.js {
            proxy_pass http://ohif-viewer:80/app-config.js;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store";
        }

        location /livekit/ {
            proxy_pass http://livekit:7880/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /download/ {
            alias /etc/nginx/html/download/;
            add_header Content-Disposition 'attachment; filename="app-debug.apk"';
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
