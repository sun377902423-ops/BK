events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location /api/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /uploads/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "public, max-age=86400";
        }

        location /orthanc/ {
            proxy_pass http://orthanc:8042/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization "Basic b3J0aGFuYzpvcnRoYW5j";
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_hide_header WWW-Authenticate;
        }

        location /ohif-custom.js {
            root /etc/nginx/custom;
            add_header Content-Type application/javascript;
            add_header Cache-Control "no-cache, no-store";
        }

        location /ohif/ {
            proxy_pass http://ohif-viewer:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Accept-Encoding "";
            sub_filter 'src="/' 'src="/ohif/';
            sub_filter 'href="/' 'href="/ohif/';
            sub_filter "window.PUBLIC_URL = '/'" "window.PUBLIC_URL = '/ohif/'";
            sub_filter '<title>OHIF Viewer</title>' '<title>BK-PACS</title>';
            sub_filter '</head>' '<script src="/ohif-custom.js"></script></head>';
            sub_filter_once off;
        }

        location ~ ^/[^/]+\.(bundle[._~\w]*\.js|css|json|mjs|png|ico|svg|woff2?)$ {
            proxy_pass http://ohif-viewer:80;
            proxy_set_header Host $host;
        }

        location = /app-config.js {
            proxy_pass http://ohif-viewer:80/app-config.js;
            proxy_set_header Host $host;
        }

        location /livekit/ {
            proxy_pass http://livekit:7880/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        server_name _;
        client_max_body_size 100M;

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location /api/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /uploads/ {
            proxy_pass http://backend:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Cache-Control "public, max-age=86400";
        }

        location /orthanc/ {
            proxy_pass http://orthanc:8042/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization "Basic b3J0aGFuYzpvcnRoYW5j";
            proxy_buffering off;
            proxy_request_buffering off;
            client_max_body_size 100M;
            proxy_read_timeout 300s;
            proxy_hide_header WWW-Authenticate;
        }

        location /ohif-custom.js {
            root /etc/nginx/custom;
            add_header Content-Type application/javascript;
            add_header Cache-Control "no-cache, no-store";
        }

        location /ohif/ {
            proxy_pass http://ohif-viewer:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Accept-Encoding "";
            sub_filter 'src="/' 'src="/ohif/';
            sub_filter 'href="/' 'href="/ohif/';
            sub_filter "window.PUBLIC_URL = '/'" "window.PUBLIC_URL = '/ohif/'";
            sub_filter '<title>OHIF Viewer</title>' '<title>BK-PACS</title>';
            sub_filter '</head>' '<script src="/ohif-custom.js"></script></head>';
            sub_filter_once off;
        }

        location ~ ^/[^/]+\.(bundle[._~\w]*\.js|css|json|mjs|png|ico|svg|woff2?)$ {
            proxy_pass http://ohif-viewer:80;
            proxy_set_header Host $host;
        }

        location = /app-config.js {
            proxy_pass http://ohif-viewer:80/app-config.js;
            proxy_set_header Host $host;
        }

        location /livekit/ {
            proxy_pass http://livekit:7880/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
